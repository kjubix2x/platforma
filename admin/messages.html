<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07070a">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="apple-touch-icon" href="../icon-192.svg">
  <title>Wiadomości — Crystal Ballers</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .messenger { display:flex; height:calc(100vh - var(--hdr-h)); overflow:hidden; }
    .conv-list {
      width:300px; border-right:1px solid var(--border);
      background:var(--bg2); overflow-y:auto; flex-shrink:0;
    }
    .conv-list-header { padding:16px 18px; border-bottom:1px solid var(--border); }
    .conv-item {
      display:flex; gap:12px; align-items:center; padding:14px 18px;
      cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.15s;
    }
    .conv-item:hover { background:var(--card2); }
    .conv-item.active { background:var(--gold3); border-left:2px solid var(--gold); }
    .conv-avatar {
      width:42px; height:42px; border-radius:50%;
      background:var(--gold2); border:2px solid var(--gold);
      display:flex; align-items:center; justify-content:center;
      font-size:0.82rem; font-weight:700; color:var(--gold); flex-shrink:0;
    }
    .conv-info { flex:1; min-width:0; }
    .conv-name { font-size:0.875rem; font-weight:600; }
    .conv-preview { font-size:0.78rem; color:var(--txt2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
    .conv-meta { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
    .conv-time { font-size:0.7rem; color:var(--txt3); }
    .conv-unread-dot { background:var(--gold); color:#000; font-size:0.65rem; font-weight:700; padding:2px 6px; border-radius:var(--r-full); min-width:18px; text-align:center; }
    .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .chat-header { padding:16px 22px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:14px; flex-shrink:0; }
    .chat-date-sep { text-align:center; margin:12px 0; }
    .chat-date-sep span { font-size:0.72rem; color:var(--txt3); background:var(--bg2); padding:3px 12px; border-radius:var(--r-full); border:1px solid var(--border); }
    .send-btn { width:40px; height:40px; border-radius:50%; background:var(--gold); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#000; transition:all 0.15s; flex-shrink:0; }
    .send-btn:hover { background:#d4af68; transform:scale(1.05); }
    .no-conv { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--txt3); }
    @media (max-width:768px){
      .conv-list { width:100%; position:absolute; z-index:10; height:100%; }
      .conv-list.hidden-mobile { display:none; }
      .chat-area.hidden-mobile { display:none; }
    }
  </style>
</head>
<body class="app-body">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">CB</div>
      <div><div class="sidebar-logo-name">Crystal Ballers</div><div class="sidebar-logo-sub">Panel Trenera</div></div>
    </a>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-section-label" style="padding-top:8px">Zarządzanie</div>
    <a class="nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="players.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Zawodnicy</a>
    <a class="nav-link" href="plans.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Plany treningowe</a>
    <a class="nav-link" href="messages.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Wiadomości<span class="nav-badge hidden" id="msgBadge">0</span></a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-user" id="sidebarUser"></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main-content" style="overflow:hidden">
  <header class="page-header">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>Wiadomości</h1>
  </header>

  <div class="messenger">
    <!-- Conversation list -->
    <div class="conv-list" id="convList">
      <div class="conv-list-header">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="form-input search-input" type="text" id="convSearch" placeholder="Szukaj zawodnika...">
        </div>
      </div>
      <div id="convItems"></div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <div class="no-conv" id="noConv">
        <div style="font-size:3rem;opacity:0.3;margin-bottom:12px">💬</div>
        <p>Wybierz zawodnika aby rozpocząć rozmowę.</p>
      </div>

      <div id="chatPanel" style="display:none;flex-direction:column;height:100%">
        <div class="chat-header">
          <button class="btn-icon" id="backBtn" style="display:none" onclick="showConvList()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="conv-avatar" id="chatAvatar">—</div>
          <div>
            <h3 id="chatName" style="font-size:0.95rem;font-weight:700">—</h3>
            <div class="text-xs text-muted" id="chatPlan">—</div>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="msgInput" placeholder="Napisz wiadomość do zawodnika..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
if (!(await Auth.requireAdmin())) return;
const admin = Auth.getUser();
renderSidebarUser(admin);
updateMsgBadge(admin.id);

CB.subscribeMessages(() => { renderConvList(); if (activePlayerId) renderMessages(); updateMsgBadge(admin.id); });

let activePlayerId = null;
let convSearchQuery = '';

// ── Render conversation list ──────────────────────────
function renderConvList() {
  let convs = CB.getAllMessagesForAdmin();
  if (convSearchQuery) convs = convs.filter(c => c.player.name.toLowerCase().includes(convSearchQuery));

  // sort by last message time
  convs.sort((a,b) => {
    const ta = a.lastMessage ? a.lastMessage.timestamp : '0';
    const tb = b.lastMessage ? b.lastMessage.timestamp : '0';
    return tb.localeCompare(ta);
  });

  document.getElementById('convItems').innerHTML = convs.map(c => {
    const p = c.player;
    const preview = c.lastMessage
      ? (c.lastMessage.fromId === 'u1' ? 'Ty: ' : '') + c.lastMessage.text
      : 'Brak wiadomości';
    return `
    <div class="conv-item ${p.id===activePlayerId?'active':''}" onclick="openConv('${p.id}')">
      <div class="conv-avatar">${p.avatarInitials}</div>
      <div class="conv-info">
        <div class="conv-name">${p.name}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${c.lastMessage ? CB.timeAgo(c.lastMessage.timestamp) : ''}</span>
        ${c.unread ? `<span class="conv-unread-dot">${c.unread}</span>` : ''}
      </div>
    </div>`;
  }).join('') || '<p class="text-muted text-sm" style="padding:20px;text-align:center">Brak zawodników.</p>';
}

// ── Open conversation ─────────────────────────────────
window.openConv = async function(playerId) {
  activePlayerId = playerId;
  const p = CB.getUserById(playerId);
  const subStatus = CB.hasActiveSubscription(p) ? 'Aktywna sub.' : 'Bez subskrypcji';

  await CB.markRead(playerId, admin.id);
  updateMsgBadge(admin.id);

  document.getElementById('noConv').style.display = 'none';
  document.getElementById('chatPanel').style.display = 'flex';
  document.getElementById('chatAvatar').textContent = p.avatarInitials;
  document.getElementById('chatName').textContent = p.name;
  document.getElementById('chatPlan').textContent = subStatus;

  renderMessages();
  renderConvList();

  // Mobile
  if (window.innerWidth <= 768) {
    document.getElementById('convList').classList.add('hidden-mobile');
    document.getElementById('chatArea').classList.remove('hidden-mobile');
    document.getElementById('backBtn').style.display = 'flex';
  }
}

window.showConvList = function() {
  document.getElementById('convList').classList.remove('hidden-mobile');
  document.getElementById('chatArea').classList.add('hidden-mobile');
};

// ── Render messages ───────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderMessages() {
  const msgs = CB.getMessages(admin.id, activePlayerId);
  const wrap = document.getElementById('chatMessages');
  const p = CB.getUserById(activePlayerId);
  let lastDate = null;

  if (!msgs.length) {
    wrap.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:0.85rem">Brak wiadomości — rozpocznij rozmowę.</div>`;
    return;
  }

  wrap.innerHTML = msgs.map(m => {
    const isSent = m.fromId === 'u1';
    const date = m.timestamp.slice(0,10);
    let sep = '';
    if (date !== lastDate) {
      lastDate = date;
      const label = new Date(m.timestamp).toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long'});
      sep = `<div class="chat-date-sep"><span>${label}</span></div>`;
    }
    const time = new Date(m.timestamp).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
    return `${sep}
    <div class="msg ${isSent?'sent':'received'}">
      <div class="msg-avatar">${isSent?admin.avatarInitials:p.avatarInitials}</div>
      <div>
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-time">${time}${isSent?(m.read?' · ✓✓ Odczytano':' · ✓ Wysłano'):''}</div>
      </div>
    </div>`;
  }).join('');
  wrap.scrollTop = wrap.scrollHeight;
}

// ── Send ──────────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activePlayerId) return;
  input.value = ''; input.style.height = 'auto';
  try { await CB.sendMessage(admin.id, activePlayerId, text); renderMessages(); renderConvList(); }
  catch(e) { showToast('Błąd: '+e.message,'error'); }
}

document.getElementById('sendBtn').addEventListener('click', sendMsg);
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});
document.getElementById('convSearch').addEventListener('input', e => {
  convSearchQuery = e.target.value.toLowerCase().trim();
  renderConvList();
});

renderConvList();

const urlId = new URLSearchParams(window.location.search).get('id');
if (urlId && CB.getUserById(urlId)) openConv(urlId);
})().catch(e => { console.error(e); alert('Błąd: '+e.message); });
</script>
</body>
</html>
