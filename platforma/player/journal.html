<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07070a">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="apple-touch-icon" href="../icon-192.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dziennik Treningowy — Crystal Ballers</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .rpe-selector { display:flex; gap:6px; flex-wrap:wrap; }
    .rpe-btn {
      width:36px; height:36px; border-radius:var(--r-sm);
      background:var(--card); border:1px solid var(--border);
      color:var(--txt2); font-size:0.82rem; font-weight:600;
      cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center;
    }
    .rpe-btn.selected { background:var(--gold); color:#000; border-color:var(--gold); }
    .rpe-btn:hover:not(.selected) { border-color:var(--border2); color:var(--txt); }
    .feeling-selector { display:flex; gap:8px; }
    .feeling-btn {
      flex:1; padding:10px 4px; text-align:center;
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-md); cursor:pointer; transition:all 0.15s;
      font-size:1.2rem;
    }
    .feeling-btn.selected { border-color:var(--gold); background:var(--gold2); }
    .exercise-inputs { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:8px; align-items:center; }
    .exercise-inputs input { padding:9px 12px; }
    .ex-row-wrap { display:flex; flex-direction:column; gap:6px; }
    .ex-row-item { display:grid; grid-template-columns:2fr 1fr 1fr 1fr 28px; gap:8px; align-items:center; }
    .remove-ex { background:none; border:none; cursor:pointer; color:var(--txt3); padding:4px; border-radius:var(--r-sm); }
    .remove-ex:hover { color:var(--red); background:var(--red2); }
    .journal-list { display:flex; flex-direction:column; gap:12px; }
    .record-badge { display:inline-flex; align-items:center; gap:4px; font-size:0.68rem; color:var(--gold); background:var(--gold2); padding:2px 8px; border-radius:var(--r-full); font-weight:700; }
    .sprint-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .sprint-input-wrap label { font-size:0.72rem; color:var(--txt3); display:block; margin-bottom:5px; }
  </style>
</head>
<body class="app-body">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">CB</div>
      <div><div class="sidebar-logo-name">Crystal Ballers</div><div class="sidebar-logo-sub">Athletic Performance</div></div>
    </a>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="plan.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Mój Plan</a>
    <a class="nav-link" href="journal.html"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Dziennik</a>
    <a class="nav-link" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Wiadomości<span class="nav-badge hidden" id="msgBadge">0</span></a>
    <a class="nav-link" href="performance.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Wyniki</a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-user" id="sidebarUser"></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main-content">
  <header class="page-header">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>Dziennik Treningowy</h1>
    <div class="page-header-actions">
      <button class="btn btn-primary btn-sm" onclick="openModal('addEntryModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Dodaj wpis
      </button>
    </div>
  </header>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid mb-24" id="journalStats"></div>

    <!-- Entries -->
    <div class="section-header">
      <h2 class="section-title">Historia treningów</h2>
      <span class="text-muted text-sm" id="entryCount">0 wpisów</span>
    </div>
    <div class="journal-list" id="journalList">
      <div class="empty-state">
        <div class="empty-state-icon">📖</div>
        <h3>Brak wpisów</h3>
        <p>Zacznij zapisywać swoje treningi aby śledzić postępy.</p>
        <button class="btn btn-primary" onclick="openModal('addEntryModal')">Dodaj pierwszy wpis</button>
      </div>
    </div>
  </div>
</main>

<!-- Add Entry Modal -->
<div class="modal-overlay" id="addEntryModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h2 class="modal-title">Nowy wpis treningowy</h2>
      <button class="modal-close" data-close-modal><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

    <div class="form-group">
      <label class="form-label">Data treningu</label>
      <input class="form-input" type="date" id="entryDate">
    </div>

    <!-- Exercises -->
    <div class="form-group">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <label class="form-label" style="margin:0">Ćwiczenia</label>
        <button class="btn btn-ghost btn-sm" id="addExBtn">+ Dodaj ćwiczenie</button>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 28px;gap:8px;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px">
        <span class="text-xs text-dim">Ćwiczenie</span>
        <span class="text-xs text-dim">Serie</span>
        <span class="text-xs text-dim">Powt.</span>
        <span class="text-xs text-dim">Ciężar (kg)</span>
        <span></span>
      </div>
      <div class="ex-row-wrap" id="exerciseRows"></div>
    </div>

    <!-- Sprint times -->
    <div class="form-group">
      <label class="form-label">Czasy sprintów (s) — opcjonalnie</label>
      <div class="sprint-grid">
        <div class="sprint-input-wrap"><label>Sprint 5m</label><input class="form-input" type="number" step="0.01" id="sprint5" placeholder="1.05"></div>
        <div class="sprint-input-wrap"><label>Sprint 10m</label><input class="form-input" type="number" step="0.01" id="sprint10" placeholder="1.72"></div>
        <div class="sprint-input-wrap"><label>Sprint 30m</label><input class="form-input" type="number" step="0.01" id="sprint30" placeholder="4.21"></div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Wyskok CMJ (cm)</label>
        <input class="form-input" type="number" id="jumpVal" placeholder="60">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Masa ciała (kg)</label>
        <input class="form-input" type="number" step="0.1" id="bwVal" placeholder="76.5">
      </div>
    </div>

    <!-- RPE -->
    <div class="form-group mt-16">
      <label class="form-label">Intensywność (RPE 1–10)</label>
      <div class="rpe-selector" id="rpeSelector"></div>
      <div class="form-hint" id="rpeHint">Wybierz poziom wysiłku</div>
    </div>

    <!-- Feeling -->
    <div class="form-group">
      <label class="form-label">Samopoczucie</label>
      <div class="feeling-selector" id="feelingSelector"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Notatki</label>
      <textarea class="form-input" id="entryNotes" placeholder="Jak przebiegł trening? Co czujesz?" rows="3"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Anuluj</button>
      <button class="btn btn-primary" id="saveEntryBtn">Zapisz trening</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
if (!(await Auth.requirePlayer())) return;
const user = Auth.getUser();
if (!CB.hasActiveSubscription(user)) { window.location.href = '../pricing.html'; return; }
renderSidebarUser(user);
updateMsgBadge(user.id);

// Set default date
document.getElementById('entryDate').value = todayStr();

// Build RPE + feeling selectors
document.getElementById('rpeSelector').innerHTML =
  Array.from({length:10},(_,i)=>`<button class="rpe-btn" data-rpe="${i+1}">${i+1}</button>`).join('');
const feelEmojis = ['😣','😕','😐','😊','🤩'];
const feelTitles = ['Fatalnie','Źle','Przeciętnie','Dobrze','Wyśmienicie'];
document.getElementById('feelingSelector').innerHTML =
  feelEmojis.map((e,i)=>`<button class="feeling-btn" data-feeling="${i+1}" title="${feelTitles[i]}">${e}</button>`).join('');

// ── Exercise rows ─────────────────────────────────────
let exercises = [{name:'',sets:'',reps:'',weight:''}];

function renderExRows() {
  const wrap = document.getElementById('exerciseRows');
  wrap.innerHTML = exercises.map((ex, i) => `
    <div class="ex-row-item">
      <input class="form-input" type="text" placeholder="np. Squat, Power Clean" value="${ex.name}" data-ex="${i}" data-field="name">
      <input class="form-input" type="number" placeholder="4" value="${ex.sets}" data-ex="${i}" data-field="sets" min="1">
      <input class="form-input" type="number" placeholder="6" value="${ex.reps}" data-ex="${i}" data-field="reps" min="1">
      <input class="form-input" type="number" placeholder="80" value="${ex.weight}" data-ex="${i}" data-field="weight" min="0">
      <button class="remove-ex" data-remove="${i}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');

  wrap.querySelectorAll('[data-ex]').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = +e.target.dataset.ex;
      exercises[idx][e.target.dataset.field] = e.target.value;
    });
  });
  wrap.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.target.closest('[data-remove]').dataset.remove;
      exercises.splice(idx, 1);
      if (!exercises.length) exercises.push({name:'',sets:'',reps:'',weight:''});
      renderExRows();
    });
  });
}
renderExRows();

document.getElementById('addExBtn').addEventListener('click', () => {
  exercises.push({name:'',sets:'',reps:'',weight:''});
  renderExRows();
});

// ── RPE ───────────────────────────────────────────────
let selectedRPE = null;
const rpeHints = ['','Bardzo lekko','Lekko','Lekko','Umiarkowanie','Umiarkowanie','Intensywnie','Intensywnie','Bardzo intensywnie','Prawie maksymalnie','Maksymalny wysiłek'];
document.querySelectorAll('.rpe-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.rpe-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedRPE = +btn.dataset.rpe;
    document.getElementById('rpeHint').textContent = rpeHints[selectedRPE] || '';
  });
});

// ── Feeling ───────────────────────────────────────────
let selectedFeeling = null;
document.querySelectorAll('.feeling-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedFeeling = +btn.dataset.feeling;
  });
});

// ── Save ──────────────────────────────────────────────
document.getElementById('saveEntryBtn').addEventListener('click', async () => {
  const date = document.getElementById('entryDate').value;
  if (!date) { showToast('Wybierz datę treningu.','error'); return; }
  const validEx = exercises.filter(e => e.name.trim());
  if (!validEx.length) { showToast('Dodaj co najmniej jedno ćwiczenie.','error'); return; }

  const btn = document.getElementById('saveEntryBtn');
  btn.disabled = true; btn.textContent = 'Zapisywanie...';
  try {
    await CB.addJournalEntry({
      userId: user.id, date, exercises: validEx,
      sprint5m:  document.getElementById('sprint5').value  || null,
      sprint10m: document.getElementById('sprint10').value || null,
      sprint30m: document.getElementById('sprint30').value || null,
      jump:      document.getElementById('jumpVal').value  || null,
      bodyweight:document.getElementById('bwVal').value    || null,
      rpe: selectedRPE, feeling: selectedFeeling,
      notes: document.getElementById('entryNotes').value
    });
  } catch (e) { btn.disabled = false; btn.textContent = 'Zapisz trening'; showToast('Błąd: '+e.message,'error'); return; }
  btn.disabled = false; btn.textContent = 'Zapisz trening';

  closeModal('addEntryModal');
  showToast('Trening zapisany pomyślnie!');
  // Reset
  exercises = [{name:'',sets:'',reps:'',weight:''}];
  renderExRows();
  selectedRPE = null; selectedFeeling = null;
  document.querySelectorAll('.rpe-btn,.feeling-btn').forEach(b => b.classList.remove('selected'));
  ['sprint5','sprint10','sprint30','jumpVal','bwVal','entryNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('entryDate').value = todayStr();
  renderJournal();
});

// ── Render journal ────────────────────────────────────
function renderJournal() {
  const journal = CB.getJournalByUser(user.id);
  document.getElementById('entryCount').textContent = journal.length + ' wpisów';

  // Stats
  const totalEx   = journal.reduce((s,j) => s + j.exercises.length, 0);
  const avgRPE    = journal.filter(j=>j.rpe).length ? (journal.filter(j=>j.rpe).reduce((s,j)=>s+j.rpe,0)/journal.filter(j=>j.rpe).length).toFixed(1) : '—';
  const bestSprint= journal.filter(j=>j.sprint30m).length ? Math.min(...journal.filter(j=>j.sprint30m).map(j=>+j.sprint30m)).toFixed(2) : '—';
  const bestJump  = journal.filter(j=>j.jump).length ? Math.max(...journal.filter(j=>j.jump).map(j=>+j.jump)) : '—';

  document.getElementById('journalStats').innerHTML = `
    <div class="stat-card" style="--accent:var(--gold);--icon-bg:var(--gold2);--icon-clr:var(--gold)">
      <div class="stat-card-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      <div class="stat-card-label">Sesji treningowych</div>
      <div class="stat-card-value">${journal.length}</div>
    </div>
    <div class="stat-card" style="--accent:var(--green);--icon-bg:var(--green2);--icon-clr:var(--green)">
      <div class="stat-card-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="stat-card-label">Średnie RPE</div>
      <div class="stat-card-value">${avgRPE}</div>
    </div>
    <div class="stat-card" style="--accent:var(--blue);--icon-bg:var(--blue2);--icon-clr:var(--blue)">
      <div class="stat-card-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div class="stat-card-label">Sprint 30m (PR)</div>
      <div class="stat-card-value">${bestSprint !== '—' ? bestSprint + 's' : '—'}</div>
    </div>
    <div class="stat-card" style="--accent:var(--amber);--icon-bg:rgba(245,158,11,0.1);--icon-clr:var(--amber)">
      <div class="stat-card-icon"><svg viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg></div>
      <div class="stat-card-label">Wyskok CMJ (PR)</div>
      <div class="stat-card-value">${bestJump !== '—' ? bestJump + 'cm' : '—'}</div>
    </div>
  `;

  if (!journal.length) {
    document.getElementById('journalList').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📖</div>
        <h3>Brak wpisów</h3>
        <p>Zacznij zapisywać swoje treningi aby śledzić postępy.</p>
        <button class="btn btn-primary" onclick="openModal('addEntryModal')">Dodaj pierwszy wpis</button>
      </div>`;
    return;
  }

  const bestSprint30 = journal.filter(j=>j.sprint30m).length ? Math.min(...journal.filter(j=>j.sprint30m).map(j=>+j.sprint30m)) : null;
  const bestJumpVal  = journal.filter(j=>j.jump).length ? Math.max(...journal.filter(j=>j.jump).map(j=>+j.jump)) : null;

  document.getElementById('journalList').innerHTML = journal.map(j => {
    const isSprintPR = j.sprint30m && bestSprint30 && +j.sprint30m === bestSprint30;
    const isJumpPR   = j.jump && bestJumpVal && +j.jump === bestJumpVal;
    const feelEmoji  = ['','😣','😕','😐','😊','🤩'][j.feeling] || '';

    return `
    <div class="journal-entry">
      <div class="journal-entry-header">
        <div>
          <div style="font-weight:700;font-size:0.95rem">${CB.formatDate(j.date)}</div>
          <div class="journal-entry-date">${j.exercises.length} ćwiczeń ${j.notes ? '· '+j.notes.slice(0,50)+(j.notes.length>50?'…':'') : ''}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${isSprintPR ? '<span class="record-badge">⚡ PR Sprint</span>' : ''}
          ${isJumpPR   ? '<span class="record-badge">🏆 PR Wyskok</span>' : ''}
          ${j.feeling  ? `<span style="font-size:1.3rem">${feelEmoji}</span>` : ''}
          ${j.rpe      ? `<span class="badge badge-gray">RPE ${j.rpe}</span>` : ''}
          <button class="btn-icon" onclick="deleteEntry('${j.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>

      <!-- Exercise table -->
      <div class="table-wrap" style="margin-bottom:${(j.sprint5m||j.sprint10m||j.sprint30m||j.jump)?'14px':'0'}">
        <table>
          <thead><tr>
            <th>Ćwiczenie</th><th>Serie</th><th>Powt.</th><th>Ciężar</th>
          </tr></thead>
          <tbody>
            ${j.exercises.map(ex=>`
              <tr>
                <td>${ex.name || '—'}</td>
                <td>${ex.sets || '—'}</td>
                <td>${ex.reps || '—'}</td>
                <td>${ex.weight ? ex.weight+'kg' : '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <!-- Metrics -->
      ${(j.sprint5m||j.sprint10m||j.sprint30m||j.jump||j.bodyweight) ? `
      <div style="display:flex;gap:16px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)">
        ${j.sprint5m  ? `<div class="text-center"><div class="text-xs text-dim mb-4">5m</div><div style="font-weight:700;font-size:0.95rem">${j.sprint5m}s</div></div>` : ''}
        ${j.sprint10m ? `<div class="text-center"><div class="text-xs text-dim mb-4">10m</div><div style="font-weight:700;font-size:0.95rem">${j.sprint10m}s</div></div>` : ''}
        ${j.sprint30m ? `<div class="text-center"><div class="text-xs text-dim mb-4">30m${isSprintPR?'⚡':''}</div><div style="font-weight:700;font-size:0.95rem;color:${isSprintPR?'var(--gold)':'inherit'}">${j.sprint30m}s</div></div>` : ''}
        ${j.jump ? `<div class="text-center"><div class="text-xs text-dim mb-4">Wyskok${isJumpPR?'🏆':''}</div><div style="font-weight:700;font-size:0.95rem;color:${isJumpPR?'var(--gold)':'inherit'}">${j.jump}cm</div></div>` : ''}
        ${j.bodyweight ? `<div class="text-center"><div class="text-xs text-dim mb-4">Masa</div><div style="font-weight:700;font-size:0.95rem">${j.bodyweight}kg</div></div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

window.deleteEntry = function(id) {
  confirmAction('Usunąć ten wpis treningowy?', async () => {
    try { await CB.deleteJournalEntry(id); showToast('Wpis usunięty.'); renderJournal(); }
    catch (e) { showToast('Błąd: '+e.message,'error'); }
  });
};

renderJournal();
})().catch(e => { console.error(e); alert('Błąd: '+e.message); });
</script>
</body>
</html>
