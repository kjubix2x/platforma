<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07070a">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="apple-touch-icon" href="../icon-192.svg">
  <title>Zawodnicy — Crystal Ballers</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .players-toolbar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .players-toolbar .search-wrap { flex:1; min-width:200px; }
    .filter-pills { display:flex; gap:6px; flex-wrap:wrap; }
    .filter-pill { padding:8px 14px; border-radius:var(--r-full); background:var(--card); border:1px solid var(--border); font-size:0.8rem; cursor:pointer; color:var(--txt2); transition:all 0.15s; }
    .filter-pill.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:600; }
    .players-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
    .pcard { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:20px; transition:all 0.2s; animation:fadeUp 0.4s var(--ease-out) both; }
    .pcard:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:var(--shadow); }
    .pcard-top { display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; }
    .pcard-avatar { width:48px; height:48px; border-radius:50%; background:var(--gold2); border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; color:var(--gold); flex-shrink:0; }
    .pcard-name { font-size:1rem; font-weight:700; }
    .pcard-email { font-size:0.78rem; color:var(--txt3); }
    .pcard-meta { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; padding:14px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .pcard-meta-item .label { font-size:0.66rem; color:var(--txt3); text-transform:uppercase; letter-spacing:0.08em; }
    .pcard-meta-item .value { font-size:0.85rem; font-weight:600; margin-top:2px; }
    .pcard-actions { display:flex; gap:6px; flex-wrap:wrap; }
  </style>
</head>
<body class="app-body">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">CB</div>
      <div><div class="sidebar-logo-name">Crystal Ballers</div><div class="sidebar-logo-sub">Panel Trenera</div></div>
    </a>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-section-label" style="padding-top:8px">Zarządzanie</div>
    <a class="nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="players.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Zawodnicy</a>
    <a class="nav-link" href="plans.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Plany treningowe</a>
    <a class="nav-link" href="messages.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Wiadomości<span class="nav-badge hidden" id="msgBadge">0</span></a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-user" id="sidebarUser"></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main-content">
  <header class="page-header">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>Zawodnicy</h1>
  </header>

  <div class="content">
    <div class="players-toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="form-input search-input" type="text" id="searchInput" placeholder="Szukaj zawodnika...">
      </div>
      <div class="filter-pills">
        <div class="filter-pill active" data-filter="all">Wszyscy</div>
        <div class="filter-pill" data-filter="sub">Z subskrypcją</div>
        <div class="filter-pill" data-filter="nosub">Bez subskrypcji</div>
      </div>
    </div>
    <div class="players-grid" id="playersGrid"></div>
  </div>
</main>

<!-- Player Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h2 class="modal-title">Profil zawodnika</h2>
      <button class="modal-close" data-close-modal><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
if (!(await Auth.requireAdmin())) return;
const admin = Auth.getUser();
renderSidebarUser(admin);
updateMsgBadge(admin.id);

let currentFilter = 'all';
let searchQuery = '';

function subBadge(p) {
  if (CB.hasActiveSubscription(p)) {
    const plan = p.subscriptionPlan === 'yearly' ? 'roczna' : 'miesięczna';
    return `<span class="badge badge-green"><span class="badge-dot" style="background:var(--green)"></span>Sub ${plan}</span>`;
  }
  return `<span class="badge badge-red"><span class="badge-dot" style="background:var(--red)"></span>Bez subskrypcji</span>`;
}

function renderPlayers() {
  let players = CB.getPlayers();
  if (currentFilter === 'sub') players = players.filter(p => CB.hasActiveSubscription(p));
  else if (currentFilter === 'nosub') players = players.filter(p => !CB.hasActiveSubscription(p));
  if (searchQuery) players = players.filter(p =>
    p.name.toLowerCase().includes(searchQuery) || p.email.toLowerCase().includes(searchQuery));

  const grid = document.getElementById('playersGrid');
  if (!players.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <h3>Brak zawodników</h3>
      <p>${currentFilter === 'all' ? 'Zawodnicy rejestrują się sami przez stronę główną.' : 'Brak wyników dla wybranego filtra.'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = players.map((p, i) => {
    const journal = CB.getJournalByUser(p.id);
    const unreadFromP = CB.getMessages(admin.id, p.id).filter(m=>m.fromId===p.id && !m.read).length;
    const subEnd = p.subscriptionEndDate ? CB.formatDate(p.subscriptionEndDate) : '—';
    return `
    <div class="pcard" style="animation-delay:${i*0.04}s">
      <div class="pcard-top">
        <div class="pcard-avatar">${p.avatarInitials}</div>
        <div style="flex:1;min-width:0">
          <div class="pcard-name">${p.name}</div>
          <div class="pcard-email">${p.email}</div>
          <div class="mt-8">${subBadge(p)}</div>
        </div>
        ${unreadFromP ? `<span class="badge badge-red">${unreadFromP}</span>` : ''}
      </div>
      <div class="pcard-meta">
        <div class="pcard-meta-item">
          <div class="label">Sub. wygasa</div>
          <div class="value">${subEnd}</div>
        </div>
        <div class="pcard-meta-item">
          <div class="label">Treningi</div>
          <div class="value">${journal.length}</div>
        </div>
        <div class="pcard-meta-item">
          <div class="label">Streak</div>
          <div class="value">${p.streak||0} dni</div>
        </div>
        <div class="pcard-meta-item">
          <div class="label">Ostatnio</div>
          <div class="value">${CB.timeAgo(p.lastLogin) || 'Nigdy'}</div>
        </div>
      </div>
      <div class="pcard-actions">
        <button class="btn btn-secondary btn-sm" onclick="viewDetail('${p.id}')">Profil</button>
        <a class="btn btn-ghost btn-sm" href="messages.html?id=${p.id}">Wiadomość</a>
        ${!CB.hasActiveSubscription(p)
          ? `<button class="btn btn-ghost btn-sm" onclick="grantSub('${p.id}')">Daj darmowy dostęp</button>`
          : `<button class="btn btn-ghost btn-sm" onclick="revokeSub('${p.id}')">Odbierz dostęp</button>`}
      </div>
    </div>`;
  }).join('');
}

document.querySelectorAll('.filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.filter;
    renderPlayers();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderPlayers();
});

function viewDetail(id) {
  const p = CB.getUserById(id);
  const journal = CB.getJournalByUser(id);
  const perfs = CB.getPerfByUser(id);
  const sessions = CB.getSessionsByUser(id);
  const payments = CB.getPaymentsByUser(id);
  const lastPerf = perfs[perfs.length-1];

  document.getElementById('detailContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="pcard-avatar" style="width:60px;height:60px;font-size:1.3rem">${p.avatarInitials}</div>
      <div>
        <div style="font-size:1.2rem;font-weight:700">${p.name}</div>
        <div class="text-sm text-muted">${p.email}</div>
        <div class="mt-8">${subBadge(p)}</div>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom:16px">
      <div class="card" style="padding:14px;text-align:center">
        <div class="stat-card-value" style="font-size:1.5rem">${journal.length}</div>
        <div class="text-xs text-dim">Treningi</div>
      </div>
      <div class="card" style="padding:14px;text-align:center">
        <div class="stat-card-value" style="font-size:1.5rem">${sessions.length}</div>
        <div class="text-xs text-dim">Sesje z planu</div>
      </div>
      <div class="card" style="padding:14px;text-align:center">
        <div class="stat-card-value" style="font-size:1.5rem">${lastPerf?lastPerf.sprint30m.toFixed(2):'—'}</div>
        <div class="text-xs text-dim">Sprint 30m</div>
      </div>
      <div class="card" style="padding:14px;text-align:center">
        <div class="stat-card-value" style="font-size:1.5rem">${lastPerf?lastPerf.jump:'—'}</div>
        <div class="text-xs text-dim">Wyskok (cm)</div>
      </div>
    </div>

    ${payments.length ? `<div class="card" style="padding:16px;margin-bottom:14px">
      <div class="card-title mb-12">Historia płatności</div>
      ${payments.slice(0,5).map(pay => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.85rem">
          <span>${pay.description}</span>
          <span class="text-gold font-bold">${pay.amountPln.toFixed(2)} zł</span>
        </div>`).join('')}
    </div>` : ''}

    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal onclick="closeModal('detailModal')">Zamknij</button>
      <a class="btn btn-secondary" href="messages.html?id=${id}">Napisz</a>
    </div>
  `;
  openModal('detailModal');
}
window.viewDetail = viewDetail;

window.grantSub = async function(id) {
  const p = CB.getUserById(id);
  if (!confirm(`Przyznać darmowy 30-dniowy dostęp dla ${p.name}? (kompy, promocja itp.)`)) return;
  try { await CB.activateSubscription(id, 'monthly'); showToast('Darmowy dostęp przyznany.'); renderPlayers(); }
  catch(e) { showToast('Błąd: '+e.message, 'error'); }
};
window.revokeSub = async function(id) {
  const p = CB.getUserById(id);
  if (!confirm(`Odebrać dostęp dla ${p.name}? Zawodnik straci dostęp do planów.`)) return;
  try {
    await CB.updateUser(id, {
      subscriptionStatus: 'none', subscriptionPlan: null,
      subscriptionEndDate: null, subscriptionCancelAt: null
    });
    showToast('Dostęp odebrany.');
    renderPlayers();
  } catch(e) { showToast('Błąd: '+e.message, 'error'); }
};

renderPlayers();
})().catch(e => { console.error(e); alert('Błąd: '+e.message); });
</script>
</body>
</html>
