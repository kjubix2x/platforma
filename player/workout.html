<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trening — Crystal Ballers</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* Workout hero */
    .wo-hero {
      background: linear-gradient(135deg, var(--type-color, var(--gold)) 0%, transparent 70%);
      background-color: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--r-2xl);
      padding: 28px 32px;
      margin-bottom: 22px;
      position: relative;
      animation: fadeUp 0.4s var(--ease-out) both;
    }
    .wo-hero-letter {
      position: absolute; right: 28px; top: 28px;
      width: 64px; height: 64px;
      background: var(--type-color, var(--gold));
      color: #000;
      border-radius: var(--r-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 900;
      letter-spacing: -0.03em;
    }
    .wo-hero-eyebrow { font-size:0.72rem; color:var(--type-color,var(--gold)); letter-spacing:0.12em; text-transform:uppercase; font-weight:700; margin-bottom:6px; }
    .wo-hero-title { font-size:1.7rem; font-weight:900; letter-spacing:-0.03em; margin-bottom:6px; max-width:75%; }
    .wo-hero-desc { font-size:0.88rem; color:var(--txt2); max-width:75%; line-height:1.55; margin-bottom:16px; }
    .wo-hero-meta { display:flex; gap:10px; flex-wrap:wrap; }

    /* Timer */
    .timer-card {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--r-xl);
      padding: 18px 22px;
      margin-bottom: 22px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      animation: fadeUp 0.4s var(--ease-out) 0.05s both;
    }
    .timer-display {
      font-size: 2.2rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      color: var(--gold);
      line-height: 1;
    }
    .timer-label { font-size:0.72rem; color:var(--txt3); text-transform:uppercase; letter-spacing:0.1em; margin-top:4px; }
    .timer-actions { display:flex; gap:8px; }

    /* Section */
    .wo-section { margin-bottom: 24px; }
    .wo-section-header {
      display:flex; align-items:center; gap:10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .wo-section-name { font-size:0.95rem; font-weight:700; }
    .wo-section-count {
      font-size:0.7rem; color:var(--txt3);
      background:var(--card); border:1px solid var(--border);
      padding:3px 9px; border-radius:var(--r-full);
    }

    /* Exercise card */
    .ex-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: all 0.25s var(--ease);
      animation: fadeUp 0.4s var(--ease-out) both;
      position: relative;
    }
    .ex-card:hover { border-color: var(--border2); }
    .ex-card.done {
      background: rgba(34,197,94,0.06);
      border-color: rgba(34,197,94,0.35);
    }
    .ex-card.done .ex-name { text-decoration: line-through; opacity: 0.6; }
    .ex-row { display: flex; gap: 14px; align-items: flex-start; }
    .ex-check {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .ex-check:hover { border-color: var(--gold); }
    .ex-check.checked { background: var(--green); border-color: var(--green); }
    .ex-check.checked svg { stroke: #000; }
    .ex-check svg { width:14px; height:14px; stroke:transparent; stroke-width:3; fill:none; transition:stroke 0.2s; }
    .ex-body { flex:1; min-width:0; }
    .ex-name { font-size:1rem; font-weight:700; letter-spacing:-0.01em; margin-bottom:4px; }
    .ex-prescription { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .ex-tag {
      display:inline-flex; align-items:center; gap:5px;
      padding: 4px 10px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--r-full);
      font-size: 0.74rem;
      font-weight: 600;
    }
    .ex-tag.sets { background:var(--gold2); color:var(--gold); border-color:rgba(200,164,90,0.3); }
    .ex-tag.reps { background:var(--blue2); color:var(--blue); border-color:rgba(96,165,250,0.3); }
    .ex-tag.rpe  { background:rgba(245,158,11,0.1); color:#f59e0b; border-color:rgba(245,158,11,0.3); }
    .ex-tag.rest { background:rgba(168,85,247,0.1); color:#a855f7; border-color:rgba(168,85,247,0.3); }
    .ex-tag.note { background:var(--red2); color:var(--red); border-color:rgba(239,68,68,0.3); }
    .ex-desc { font-size:0.82rem; color:var(--txt2); line-height:1.55; margin-bottom:10px; }
    .ex-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .ex-yt-btn {
      display:inline-flex; align-items:center; gap:6px;
      padding: 7px 12px;
      background: rgba(255,0,0,0.08);
      border: 1px solid rgba(255,0,0,0.2);
      border-radius: var(--r-sm);
      color: #ff6b6b;
      font-size: 0.78rem; font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .ex-yt-btn:hover { background: rgba(255,0,0,0.15); border-color: rgba(255,0,0,0.4); }

    /* Sticky finish */
    .finish-bar {
      position: sticky; bottom: 0;
      background: linear-gradient(to top, var(--bg) 65%, transparent);
      padding: 20px 0 16px;
      margin-top: 20px;
      z-index: 50;
    }
    .finish-card {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--r-xl);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      box-shadow: var(--shadow2);
    }
    .finish-progress-num { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
    .finish-progress-lbl { font-size: 0.72rem; color: var(--txt3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

    /* Completion modal */
    .complete-anim {
      width: 80px; height: 80px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      animation: pulseSuccess 1s var(--bounce);
    }
    .complete-anim svg { width: 38px; height: 38px; stroke: #000; stroke-width: 3; fill: none; }
    @keyframes pulseSuccess {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 640px) {
      .wo-hero { padding: 22px 20px; }
      .wo-hero-letter { width: 48px; height: 48px; font-size: 1.5rem; right:20px; top:20px; }
      .wo-hero-title { font-size: 1.4rem; max-width: 100%; }
      .wo-hero-desc { max-width: 100%; }
      .timer-display { font-size: 1.7rem; }
    }
  </style>
</head>
<body class="app-body">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">CB</div>
      <div><div class="sidebar-logo-name">Crystal Ballers</div><div class="sidebar-logo-sub">Athletic Performance</div></div>
    </a>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link active" href="plan.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Mój Plan</a>
    <a class="nav-link" href="journal.html"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Dziennik</a>
    <a class="nav-link" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Wiadomości<span class="nav-badge hidden" id="msgBadge">0</span></a>
    <a class="nav-link" href="performance.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Wyniki</a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-user" id="sidebarUser"></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main-content">
  <header class="page-header">
    <button class="hamburger" id="hamburger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="plan.html" style="display:flex;align-items:center;gap:6px;color:var(--txt2);font-size:0.85rem;text-decoration:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      Wróć do planu
    </a>
    <h1 id="pageTitle" style="margin-left:8px"></h1>
  </header>

  <div class="content" id="mainContent"></div>
</main>

<!-- Completion modal -->
<div class="modal-overlay" id="doneModal">
  <div class="modal" style="max-width:440px; text-align:center">
    <div class="complete-anim">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2 style="font-size:1.4rem; margin-bottom:8px">Trening ukończony!</h2>
    <p style="color:var(--txt2); margin-bottom:20px" id="doneStats">Świetna robota.</p>

    <div class="grid-2 mb-16" style="gap:10px">
      <div class="card" style="padding:14px;text-align:center">
        <div style="font-size:1.4rem; font-weight:800; color:var(--gold); line-height:1" id="doneTime">—</div>
        <div class="text-xs text-dim mt-4">Czas treningu</div>
      </div>
      <div class="card" style="padding:14px;text-align:center">
        <div style="font-size:1.4rem; font-weight:800; color:var(--green); line-height:1" id="doneExCount">—</div>
        <div class="text-xs text-dim mt-4">Ćwiczeń</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Jak oceniasz intensywność? (RPE)</label>
      <input type="range" id="doneRpe" min="1" max="10" value="7">
      <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--txt3);margin-top:6px">
        <span>1 (lekko)</span>
        <span id="rpeVal" style="color:var(--gold);font-weight:700">RPE 7</span>
        <span>10 (max)</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notatka (opcjonalnie)</label>
      <textarea class="form-input" id="doneNotes" rows="2" placeholder="Jak się czujesz po treningu?"></textarea>
    </div>

    <div class="flex gap-12" style="margin-top:20px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('doneModal')">Anuluj</button>
      <button class="btn btn-primary" style="flex:2" id="confirmDoneBtn">Zapisz trening</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/plans-data.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
if (!(await Auth.requirePlayer())) return;
const user = Auth.getUser();
renderSidebarUser(user);
updateMsgBadge(user.id);

const params = new URLSearchParams(window.location.search);
const planId = params.get('p');
const phaseNum = +params.get('ph');
const workoutLetter = params.get('w');
const weekNum = +params.get('wk') || 1;

const plan = CB.getPlanById(planId);
const planContent = PlanContent.get(planId);
const phase = planContent?.phases.find(p => p.num === phaseNum);
const workout = phase?.workouts.find(w => w.letter === workoutLetter);

if (!workout) {
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state">
      <h3>Nie znaleziono treningu</h3>
      <p>Sprawdź adres lub wróć do planu.</p>
      <a href="plan.html" class="btn btn-primary mt-16">Wróć do planu</a>
    </div>`;
  throw new Error();
}

document.getElementById('pageTitle').textContent = `Trening ${workout.letter}`;

const typeColors = {
  lower:'#f59e0b', upper:'#ef4444', running:'#60a5fa', fbw:'#a855f7', strength:'#C8A45A'
};
const typeColor = typeColors[workout.type] || '#C8A45A';

// ─── Hero ────────────────────────────────────────────
let exerciseCount = 0;
workout.sections.forEach(s => exerciseCount += s.exercises.length);

const heroHtml = `
  <div class="wo-hero" style="--type-color:${typeColor}">
    <div class="wo-hero-letter">${workout.letter}</div>
    <div class="wo-hero-eyebrow">${planContent.name} · Faza ${phase.num} · Tydzień ${weekNum}</div>
    <div class="wo-hero-title">${workout.title}</div>
    <div class="wo-hero-desc">${workout.description}</div>
    <div class="wo-hero-meta">
      <span class="badge badge-gold">⏱ ${workout.duration}</span>
      <span class="badge badge-blue">📋 ${exerciseCount} ćwiczeń</span>
      <span class="badge badge-gray">${workout.sections.length} sekcji</span>
      ${workout.frequency ? `<span class="badge badge-gray">${workout.frequency}</span>` : ''}
    </div>
  </div>

  <div class="timer-card">
    <div>
      <div class="timer-display" id="timerDisplay">00:00</div>
      <div class="timer-label">Czas treningu</div>
    </div>
    <div class="timer-actions">
      <button class="btn btn-secondary btn-sm" id="timerStartBtn">▶ Start</button>
      <button class="btn btn-ghost btn-sm" id="timerResetBtn">Reset</button>
    </div>
  </div>
`;

// ─── Exercises ───────────────────────────────────────
let exIdCounter = 0;
const sectionsHtml = workout.sections.map((section, sIdx) => {
  const exercisesHtml = section.exercises.map((ex, eIdx) => {
    const exId = `ex-${sIdx}-${eIdx}`;
    exIdCounter++;
    const tags = [];
    if (ex.sets)  tags.push(`<span class="ex-tag sets">${ex.sets} ${typeof ex.sets === 'number' && ex.sets > 1 ? 'serie' : 'seria'}</span>`);
    if (ex.reps)  tags.push(`<span class="ex-tag reps">${ex.reps} ${isTimeReps(ex.reps) ? '' : 'powt.'}</span>`);
    if (ex.rpe)   tags.push(`<span class="ex-tag rpe">${ex.rpe}</span>`);
    if (ex.rest)  tags.push(`<span class="ex-tag rest">⏸ ${ex.rest}</span>`);
    if (ex.notes) tags.push(`<span class="ex-tag note">⚡ ${ex.notes}</span>`);

    return `
      <div class="ex-card" id="${exId}" style="animation-delay:${exIdCounter * 0.04}s">
        <div class="ex-row">
          <button class="ex-check" data-ex="${exId}">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <div class="ex-body">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-prescription">${tags.join('')}</div>
            ${ex.desc ? `<div class="ex-desc">${ex.desc}</div>` : ''}
            <div class="ex-actions">
              <a class="ex-yt-btn" href="${PlanContent.ytSearchUrl(ex.name)}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M23 12s0-3.86-.49-5.71a3 3 0 0 0-2.12-2.13C18.54 3.67 12 3.67 12 3.67s-6.54 0-8.39.49a3 3 0 0 0-2.12 2.13C1 8.14 1 12 1 12s0 3.86.49 5.71a3 3 0 0 0 2.12 2.13c1.85.49 8.39.49 8.39.49s6.54 0 8.39-.49a3 3 0 0 0 2.12-2.13C23 15.86 23 12 23 12z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#000"/></svg>
                Zobacz instruktaż
              </a>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="wo-section">
      ${section.name ? `<div class="wo-section-header">
        <div class="wo-section-name">${section.name}</div>
        <div class="wo-section-count">${section.exercises.length}</div>
      </div>` : ''}
      ${exercisesHtml}
    </div>
  `;
}).join('');

// ─── Finish bar ──────────────────────────────────────
const finishHtml = `
  <div class="finish-bar">
    <div class="finish-card">
      <div style="display:flex;gap:20px;align-items:center">
        <div>
          <div class="finish-progress-num"><span id="doneCount">0</span> / ${exIdCounter}</div>
          <div class="finish-progress-lbl">Ukończonych ćwiczeń</div>
        </div>
        <div class="progress-bar" style="width:140px;height:6px">
          <div class="progress-bar-fill green" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <button class="btn btn-primary" id="finishBtn">
        Zakończ trening
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>
  </div>
`;

document.getElementById('mainContent').innerHTML = heroHtml + sectionsHtml + finishHtml;

function isTimeReps(r) {
  return typeof r === 'string' && (r.includes('s') || r.includes('min') || r.includes('m'));
}

// ─── Checkmarks ──────────────────────────────────────
let checked = new Set();
document.querySelectorAll('.ex-check').forEach(btn => {
  btn.addEventListener('click', () => {
    const exId = btn.dataset.ex;
    const card = document.getElementById(exId);
    if (checked.has(exId)) {
      checked.delete(exId);
      card.classList.remove('done');
      btn.classList.remove('checked');
    } else {
      checked.add(exId);
      card.classList.add('done');
      btn.classList.add('checked');
    }
    updateProgress();
  });
});

function updateProgress() {
  const pct = exIdCounter ? Math.round((checked.size / exIdCounter) * 100) : 0;
  document.getElementById('doneCount').textContent = checked.size;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ─── Timer ───────────────────────────────────────────
let timerSec = 0, timerInt = null, timerRunning = false;
function fmtTimer(s) {
  const m = Math.floor(s / 60), r = s % 60;
  return String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0');
}
document.getElementById('timerStartBtn').addEventListener('click', () => {
  const btn = document.getElementById('timerStartBtn');
  if (timerRunning) {
    clearInterval(timerInt);
    timerRunning = false;
    btn.textContent = '▶ Wznów';
  } else {
    timerInt = setInterval(() => {
      timerSec++;
      document.getElementById('timerDisplay').textContent = fmtTimer(timerSec);
    }, 1000);
    timerRunning = true;
    btn.textContent = '⏸ Pauza';
  }
});
document.getElementById('timerResetBtn').addEventListener('click', () => {
  clearInterval(timerInt);
  timerRunning = false;
  timerSec = 0;
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerStartBtn').textContent = '▶ Start';
});

// Auto-start timer
setTimeout(() => document.getElementById('timerStartBtn').click(), 1000);

// ─── Finish ──────────────────────────────────────────
document.getElementById('finishBtn').addEventListener('click', () => {
  if (checked.size === 0) {
    if (!confirm('Nie odhaczyłeś żadnego ćwiczenia. Naprawdę zakończyć?')) return;
  }
  clearInterval(timerInt);
  document.getElementById('doneStats').textContent =
    `Faza ${phase.num} · Tydzień ${weekNum} · ${workout.title}`;
  document.getElementById('doneTime').textContent = fmtTimer(timerSec);
  document.getElementById('doneExCount').textContent = checked.size + ' / ' + exIdCounter;
  openModal('doneModal');
});

document.getElementById('doneRpe').addEventListener('input', e => {
  document.getElementById('rpeVal').textContent = 'RPE ' + e.target.value;
});

document.getElementById('confirmDoneBtn').addEventListener('click', async () => {
  const btn = document.getElementById('confirmDoneBtn');
  btn.disabled = true; btn.textContent = 'Zapisywanie...';
  try {
    const rpe = +document.getElementById('doneRpe').value;
    const notes = document.getElementById('doneNotes').value.trim();
    const durationMin = Math.round(timerSec / 60);

    await CB.addCompletedSession({
      userId: user.id,
      planId, phaseNum, workoutLetter: workout.letter, weekNum,
      date: todayStr(),
      durationMin, rpe,
      exercisesDone: checked.size, exercisesTotal: exIdCounter,
      notes
    });

    const doneExercises = [];
    workout.sections.forEach((sec, sIdx) => {
      sec.exercises.forEach((ex, eIdx) => {
        if (checked.has(`ex-${sIdx}-${eIdx}`)) {
          doneExercises.push({
            name: ex.name,
            sets: typeof ex.sets === 'number' ? ex.sets : (ex.sets || ''),
            reps: ex.reps || '',
            weight: '',
            notes: ex.notes || ''
          });
        }
      });
    });

    await CB.addJournalEntry({
      userId: user.id, date: todayStr(),
      exercises: doneExercises,
      sprint5m: null, sprint10m: null, sprint30m: null, jump: null, bodyweight: null,
      rpe, feeling: rpe <= 4 ? 4 : rpe <= 7 ? 3 : 2,
      notes: notes + (notes ? ' · ' : '') + `Auto: ${planContent.name} · F${phase.num} ${workout.title}`
    });

    const todayKey = todayStr();
    const yesterdayKey = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    const userSessions = CB.getSessionsByUser(user.id);
    const todaySessions = userSessions.filter(s => s.date === todayKey);
    let streak = user.streak || 0;
    if (todaySessions.length === 1) {
      const prevDayHadSession = userSessions.some(s => s.date === yesterdayKey);
      streak = prevDayHadSession ? streak + 1 : Math.max(streak, 1);
    }
    const journalThisWeek = CB.getJournalByUser(user.id)
      .filter(j => (new Date() - new Date(j.date)) < 7*86400000).length;
    const weekProgress = Math.min(100, Math.round((journalThisWeek / 5) * 100));
    await CB.updateUser(user.id, { streak, weekProgress });

    closeModal('doneModal');
    showToast('Trening zapisany! Świetna robota.');
    setTimeout(() => window.location.href = 'plan.html', 800);
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Zapisz trening';
    showToast('Błąd: ' + e.message, 'error');
  }
});
})().catch(e => { console.error(e); alert('Błąd: '+e.message); });
</script>
</body>
