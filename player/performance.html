<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wyniki — Crystal Ballers</title>
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .milestone-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
    .milestone {
      background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg);
      padding:16px 18px; text-align:center; transition:border-color 0.2s;
      position:relative; overflow:hidden;
    }
    .milestone.unlocked { border-color:rgba(200,164,90,0.4); background:var(--gold3); }
    .milestone.unlocked::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--gold); }
    .milestone-icon { font-size:2rem; margin-bottom:8px; }
    .milestone-name { font-size:0.82rem; font-weight:600; margin-bottom:4px; }
    .milestone-desc { font-size:0.72rem; color:var(--txt3); }
    .milestone.locked .milestone-icon { filter:grayscale(1); opacity:0.3; }
    .milestone.locked .milestone-name { color:var(--txt3); }
    .chart-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; margin-bottom:20px; }
    .chart-card canvas { max-height:260px; }
    .perf-table-wrap { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; }
    .improvement { font-size:0.72rem; font-weight:600; }
    .improvement.good { color:var(--green); }
    .improvement.bad  { color:var(--red); }
  </style>
</head>
<body class="app-body">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">CB</div>
      <div><div class="sidebar-logo-name">Crystal Ballers</div><div class="sidebar-logo-sub">Athletic Performance</div></div>
    </a>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="plan.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Mój Plan</a>
    <a class="nav-link" href="journal.html"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Dziennik</a>
    <a class="nav-link" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Wiadomości<span class="nav-badge hidden" id="msgBadge">0</span></a>
    <a class="nav-link" href="performance.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Wyniki</a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-user" id="sidebarUser"></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main-content">
  <header class="page-header">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>Monitoring Wyników</h1>
    <div class="page-header-actions">
      <button class="btn btn-primary btn-sm" onclick="openModal('addPerfModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Dodaj pomiar
      </button>
    </div>
  </header>

  <div class="content">

    <!-- Current metrics -->
    <div class="section-header mb-16">
      <h2 class="section-title">Aktualne wyniki</h2>
      <span class="text-muted text-sm" id="lastMeasureDate">—</span>
    </div>
    <div class="perf-grid mb-24" id="perfMetrics"></div>

    <!-- Milestones -->
    <div class="section-header mb-16">
      <h2 class="section-title">Osiągnięcia</h2>
    </div>
    <div class="milestone-grid" id="milestones"></div>

    <!-- Charts -->
    <div class="grid-2">
      <div class="chart-card">
        <div class="card-header" style="margin-bottom:16px">
          <div class="card-title">Sprint 30m — progres</div>
          <span class="badge badge-gold" id="sprintImprove">—</span>
        </div>
        <canvas id="sprintChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="card-header" style="margin-bottom:16px">
          <div class="card-title">Wyskok CMJ — progres</div>
          <span class="badge badge-green" id="jumpImprove">—</span>
        </div>
        <canvas id="jumpChart"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="card-header" style="margin-bottom:16px">
        <div class="card-title">Masa ciała</div>
      </div>
      <canvas id="bwChart" style="max-height:180px"></canvas>
    </div>

    <!-- History table -->
    <div class="section-header mb-16 mt-8">
      <h2 class="section-title">Historia pomiarów</h2>
    </div>
    <div class="perf-table-wrap">
      <div class="table-wrap">
        <table id="perfTable">
          <thead><tr>
            <th>Data</th><th>5m</th><th>10m</th><th>30m</th><th>Wyskok</th><th>Masa</th><th>COD</th>
          </tr></thead>
          <tbody id="perfTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Add Performance Modal -->
<div class="modal-overlay" id="addPerfModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h2 class="modal-title">Nowy pomiar</h2>
      <button class="modal-close" data-close-modal><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="form-group">
      <label class="form-label">Data pomiaru</label>
      <input class="form-input" type="date" id="perfDate">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Sprint 5m (s)</label>
        <input class="form-input" type="number" step="0.01" id="p5m" placeholder="1.05">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Sprint 10m (s)</label>
        <input class="form-input" type="number" step="0.01" id="p10m" placeholder="1.72">
      </div>
    </div>
    <div class="form-row mt-12">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Sprint 30m (s)</label>
        <input class="form-input" type="number" step="0.01" id="p30m" placeholder="4.21">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Zmiana kierunku (s)</label>
        <input class="form-input" type="number" step="0.01" id="pCOD" placeholder="2.10">
      </div>
    </div>
    <div class="form-row mt-12">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Wyskok CMJ (cm)</label>
        <input class="form-input" type="number" id="pJump" placeholder="60">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Masa ciała (kg)</label>
        <input class="form-input" type="number" step="0.1" id="pBW" placeholder="76.5">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Anuluj</button>
      <button class="btn btn-primary" id="savePerfBtn">Zapisz pomiar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
if (!(await Auth.requirePlayer())) return;
const user = Auth.getUser();
renderSidebarUser(user);
updateMsgBadge(user.id);
document.getElementById('perfDate').value = todayStr();

const CHART_DEFAULTS = {
  responsive:true, maintainAspectRatio:true,
  plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'rgba(13,13,16,0.95)', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, titleColor:'#f0f0f4', bodyColor:'rgba(240,240,244,0.7)', padding:10 } },
  scales:{
    x:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(240,240,244,0.4)', font:{size:11}} },
    y:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(240,240,244,0.4)', font:{size:11}} }
  }
};

let sprintChart, jumpChart, bwChart;

function renderPerformance() {
  const perfs = CB.getPerfByUser(user.id);
  const last  = perfs[perfs.length - 1];
  const first = perfs[0];

  if (last) {
    document.getElementById('lastMeasureDate').textContent = 'Ostatni pomiar: ' + CB.formatDate(last.date);
  }

  // ── Metric cards ─────────────────────────────────
  const metrics = [
    { label:'Sprint 5m', val: last?.sprint5m, unit:'s', icon:'⚡', lower:true },
    { label:'Sprint 10m', val: last?.sprint10m, unit:'s', icon:'💨', lower:true },
    { label:'Sprint 30m', val: last?.sprint30m, unit:'s', icon:'🏃', lower:true },
    { label:'Zmiana kierunku', val: last?.cod, unit:'s', icon:'↩️', lower:true },
    { label:'Wyskok CMJ', val: last?.jump, unit:'cm', icon:'🦵', lower:false },
    { label:'Masa ciała', val: last?.bodyweight, unit:'kg', icon:'⚖️', lower:false }
  ];

  const bestSprint30 = perfs.filter(p=>p.sprint30m).length ? Math.min(...perfs.map(p=>p.sprint30m||99)) : null;
  const bestJump     = perfs.filter(p=>p.jump).length ? Math.max(...perfs.map(p=>p.jump||0)) : null;

  document.getElementById('perfMetrics').innerHTML = metrics.map(m => {
    const val = m.val ? (typeof m.val === 'number' ? m.val.toFixed(m.unit==='cm'||m.unit==='kg'?1:2) : m.val) : '—';
    const isBest = m.label==='Sprint 30m' && m.val && bestSprint30 && +m.val===bestSprint30
                || m.label==='Wyskok CMJ' && m.val && bestJump && +m.val===bestJump;
    return `
      <div class="perf-metric">
        <div class="perf-metric-icon">${m.icon}</div>
        <div class="perf-metric-val">${val !== '—' ? val : '—'}</div>
        <div class="perf-metric-unit">${m.unit}</div>
        <div class="perf-metric-label">${m.label}</div>
        ${isBest ? '<div class="perf-metric-best">🏆 Rekord życiowy</div>' : ''}
      </div>`;
  }).join('');

  // ── Milestones ────────────────────────────────────
  const ms = [
    { icon:'⚡', name:'Sub 4.30 — 30m', desc:'Sprint 30m poniżej 4.30s', unlocked: perfs.some(p=>p.sprint30m && p.sprint30m < 4.30) },
    { icon:'💥', name:'Sub 4.20 — 30m', desc:'Sprint 30m poniżej 4.20s', unlocked: perfs.some(p=>p.sprint30m && p.sprint30m < 4.20) },
    { icon:'🚀', name:'Sub 1.05 — 5m', desc:'Sprint 5m poniżej 1.05s', unlocked: perfs.some(p=>p.sprint5m && p.sprint5m < 1.05) },
    { icon:'🦵', name:'60cm wyskok', desc:'Wyskok CMJ ≥ 60cm', unlocked: perfs.some(p=>p.jump && p.jump >= 60) },
    { icon:'🏆', name:'65cm wyskok', desc:'Wyskok CMJ ≥ 65cm', unlocked: perfs.some(p=>p.jump && p.jump >= 65) },
    { icon:'🔥', name:'5 pomiarów', desc:'Zarejestrowano 5 testów', unlocked: perfs.length >= 5 },
    { icon:'📈', name:'Progres sprintu', desc:'Poprawa 30m o 0.20s', unlocked: perfs.length>=2 && first && last && (first.sprint30m - last.sprint30m) >= 0.20 },
    { icon:'👑', name:'Elitarny poziom', desc:'30m < 4.10s i wyskok > 65cm', unlocked: perfs.some(p=>p.sprint30m<4.10 && p.jump>65) }
  ];
  document.getElementById('milestones').innerHTML = ms.map(m => `
    <div class="milestone ${m.unlocked?'unlocked':'locked'}">
      <div class="milestone-icon">${m.icon}</div>
      <div class="milestone-name">${m.name}</div>
      <div class="milestone-desc">${m.desc}</div>
      ${m.unlocked ? '<div style="font-size:0.7rem;color:var(--gold);margin-top:6px;font-weight:600">✓ Odblokowane</div>' : ''}
    </div>`).join('');

  // ── Labels ────────────────────────────────────────
  const labels = perfs.map(p => {
    const d = new Date(p.date);
    return d.toLocaleDateString('pl-PL',{day:'numeric',month:'short'});
  });

  // Sprint improvement
  if (perfs.length >= 2 && first?.sprint30m && last?.sprint30m) {
    const diff = (first.sprint30m - last.sprint30m).toFixed(2);
    document.getElementById('sprintImprove').textContent = diff > 0 ? `-${diff}s` : `+${Math.abs(diff)}s`;
    document.getElementById('sprintImprove').className = diff > 0 ? 'badge badge-green' : 'badge badge-red';
  }
  if (perfs.length >= 2 && first?.jump && last?.jump) {
    const diff = (last.jump - first.jump).toFixed(0);
    document.getElementById('jumpImprove').textContent = diff > 0 ? `+${diff}cm` : `${diff}cm`;
  }

  // ── Charts ─────────────────────────────────────────
  const chartOpts = JSON.parse(JSON.stringify(CHART_DEFAULTS));

  if (sprintChart) sprintChart.destroy();
  sprintChart = new Chart(document.getElementById('sprintChart'), {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: perfs.map(p=>p.sprint30m),
        borderColor:'#C8A45A', backgroundColor:'rgba(200,164,90,0.08)',
        pointBackgroundColor:'#C8A45A', pointRadius:5, pointHoverRadius:7,
        tension:0.4, fill:true, borderWidth:2
      }]
    },
    options:{
      ...chartOpts,
      scales:{
        ...chartOpts.scales,
        y:{ ...chartOpts.scales.y, reverse:true, title:{display:true,text:'sekundy',color:'rgba(240,240,244,0.3)',font:{size:11}} }
      }
    }
  });

  if (jumpChart) jumpChart.destroy();
  jumpChart = new Chart(document.getElementById('jumpChart'), {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: perfs.map(p=>p.jump),
        borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,0.08)',
        pointBackgroundColor:'#22c55e', pointRadius:5, pointHoverRadius:7,
        tension:0.4, fill:true, borderWidth:2
      }]
    },
    options:{
      ...chartOpts,
      scales:{...chartOpts.scales, y:{...chartOpts.scales.y, title:{display:true,text:'centymetry',color:'rgba(240,240,244,0.3)',font:{size:11}}}}
    }
  });

  if (bwChart) bwChart.destroy();
  bwChart = new Chart(document.getElementById('bwChart'), {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: perfs.map(p=>p.bodyweight),
        borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,0.06)',
        pointBackgroundColor:'#60a5fa', pointRadius:4, pointHoverRadius:6,
        tension:0.4, fill:true, borderWidth:2
      }]
    },
    options:{
      ...chartOpts,
      scales:{...chartOpts.scales, y:{...chartOpts.scales.y, title:{display:true,text:'kg',color:'rgba(240,240,244,0.3)',font:{size:11}}}}
    }
  });

  // ── Table ─────────────────────────────────────────
  document.getElementById('perfTableBody').innerHTML = [...perfs].reverse().map((p,i,arr) => {
    const prev = arr[i+1];
    function diff(cur, prv, lower) {
      if (!cur || !prv) return '';
      const d = (cur - prv).toFixed(2);
      const better = lower ? d < 0 : d > 0;
      return `<span class="improvement ${better?'good':'bad'}">${d>0?'+':''}${d}</span>`;
    }
    return `<tr>
      <td>${CB.formatDate(p.date)}</td>
      <td>${p.sprint5m ? p.sprint5m+'s' : '—'} ${diff(p.sprint5m, prev?.sprint5m, true)}</td>
      <td>${p.sprint10m ? p.sprint10m+'s' : '—'} ${diff(p.sprint10m, prev?.sprint10m, true)}</td>
      <td>${p.sprint30m ? p.sprint30m+'s' : '—'} ${diff(p.sprint30m, prev?.sprint30m, true)}</td>
      <td>${p.jump ? p.jump+'cm' : '—'} ${diff(p.jump, prev?.jump, false)}</td>
      <td>${p.bodyweight ? p.bodyweight+'kg' : '—'}</td>
      <td>${p.cod ? p.cod+'s' : '—'}</td>
    </tr>`;
  }).join('');
}

// ── Save performance ──────────────────────────────────
document.getElementById('savePerfBtn').addEventListener('click', async () => {
  const date = document.getElementById('perfDate').value;
  if (!date) { showToast('Wybierz datę.','error'); return; }
  const btn = document.getElementById('savePerfBtn');
  btn.disabled = true; btn.textContent = 'Zapisywanie...';
  try {
    await CB.addPerf({
      userId: user.id, date,
      sprint5m:  parseFloat(document.getElementById('p5m').value)  || null,
      sprint10m: parseFloat(document.getElementById('p10m').value) || null,
      sprint30m: parseFloat(document.getElementById('p30m').value) || null,
      cod:       parseFloat(document.getElementById('pCOD').value) || null,
      jump:      parseFloat(document.getElementById('pJump').value)|| null,
      bodyweight:parseFloat(document.getElementById('pBW').value)  || null
    });
  } catch (e) { btn.disabled = false; btn.textContent = 'Zapisz pomiar'; showToast('Błąd: '+e.message,'error'); return; }
  btn.disabled = false; btn.textContent = 'Zapisz pomiar';
  closeModal('addPerfModal');
  showToast('Pomiar zapisany!');
  ['p5m','p10m','p30m','pCOD','pJump','pBW'].forEach(id => document.getElementById(id).value='');
  renderPerformance();
});

renderPerformance();
})().catch(e => { console.error(e); alert('Błąd: '+e.message); });
</script>
</body>
</html>
