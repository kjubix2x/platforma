<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiadomości — Crystal Ballers</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .chat-page { display:flex; height:calc(100vh - var(--hdr-h)); overflow:hidden; }
    .chat-main  { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .chat-header {
      padding:16px 22px; border-bottom:1px solid var(--border);
      background:var(--bg2);
      display:flex; align-items:center; gap:14px; flex-shrink:0;
    }
    .chat-header-avatar {
      width:40px; height:40px; border-radius:50%;
      background:var(--gold2); border:2px solid var(--gold);
      display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:700; color:var(--gold);
    }
    .chat-header-info h3 { font-size:0.95rem; font-weight:700; margin-bottom:2px; }
    .chat-header-status { font-size:0.75rem; color:var(--green); display:flex; align-items:center; gap:5px; }
    .chat-header-status::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; }
    .chat-date-sep { text-align:center; margin:12px 0; }
    .chat-date-sep span { font-size:0.72rem; color:var(--txt3); background:var(--bg2); padding:3px 12px; border-radius:var(--r-full); border:1px solid var(--border); }
    .typing-indicator { display:flex; gap:4px; align-items:center; padding:10px 14px; }
    .typing-indicator span { width:7px; height:7px; border-radius:50%; background:var(--txt3); animation:typingBounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .chat-input-actions { display:flex; gap:6px; flex-shrink:0; }
    .attach-btn { width:40px; height:40px; border-radius:50%; background:var(--card); border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--txt2); transition:all 0.15s; flex-shrink:0; }
    .attach-btn:hover { background:var(--card2); color:var(--txt); border-color:var(--border2); }
    .send-btn { width:40px; height:40px; border-radius:50%; background:var(--gold); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#000; transition:all 0.15s; flex-shrink:0; }
    .send-btn:hover { background:#d4af68; transform:scale(1.05); }
    .send-btn:active { transform:scale(0.95); }
    .msg-status { font-size:0.68rem; color:var(--txt3); display:flex; align-items:center; gap:4px; }
    .msg-status.read { color:var(--gold); }
    .file-attach-preview { background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:10px 14px; margin-bottom:10px; display:flex; align-items:center; gap:10px; }
  </style>
</head>
<body class="app-body">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">CB</div>
      <div><div class="sidebar-logo-name">Crystal Ballers</div><div class="sidebar-logo-sub">Athletic Performance</div></div>
    </a>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="plan.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Mój Plan</a>
    <a class="nav-link" href="journal.html"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Dziennik</a>
    <a class="nav-link" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Wiadomości<span class="nav-badge hidden" id="msgBadge">0</span></a>
    <a class="nav-link" href="performance.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Wyniki</a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-user" id="sidebarUser"></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main-content" style="overflow:hidden">
  <header class="page-header">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>Wiadomości</h1>
  </header>

  <div class="chat-page">
    <div class="chat-main">
      <!-- Chat header -->
      <div class="chat-header">
        <div class="chat-header-avatar">MT</div>
        <div class="chat-header-info">
          <h3>Trener Michał</h3>
          <div class="chat-header-status">Dostępny</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn-icon" title="Informacje">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chatMessages"></div>

      <!-- Typing indicator (hidden) -->
      <div id="typingWrap" style="padding:0 20px 6px;display:none">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--gold2);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:var(--gold)">MT</div>
          <div style="background:var(--card3);border:1px solid var(--border2);border-radius:var(--r-lg);border-bottom-left-radius:4px;padding:10px 14px">
            <div class="typing-indicator"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Załącz plik">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,.pdf">
        <textarea class="chat-input" id="chatInput" placeholder="Napisz wiadomość..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
if (!(await Auth.requirePlayer())) return;
const user = Auth.getUser();
const admin = CB.getUsers().find(u => u.role === 'admin');
if (!admin) { document.body.innerHTML = '<div style="padding:40px;text-align:center">Brak konta trenera w bazie.</div>'; return; }
const adminId = admin.id;
renderSidebarUser(user);

await CB.markRead(adminId, user.id);
updateMsgBadge(user.id);

// Realtime
CB.subscribeMessages(() => renderMessages());

// ── Render messages ────────────────────────────────────
function renderMessages() {
  const msgs   = CB.getMessages(adminId, user.id);
  const wrap   = document.getElementById('chatMessages');
  let   lastDate = null;

  wrap.innerHTML = msgs.map(m => {
    const isSent = m.fromId === user.id;
    const date   = m.timestamp.slice(0,10);
    let dateSep  = '';
    if (date !== lastDate) {
      lastDate = date;
      const d = new Date(m.timestamp);
      const label = d.toLocaleDateString('pl-PL', {weekday:'long', day:'numeric', month:'long'});
      dateSep = `<div class="chat-date-sep"><span>${label}</span></div>`;
    }
    const time = new Date(m.timestamp).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
    const initials = isSent ? user.avatarInitials : admin.avatarInitials;

    return `${dateSep}
    <div class="msg ${isSent?'sent':'received'}">
      <div class="msg-avatar">${initials}</div>
      <div>
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-time">${time}${isSent ? (m.read ? ' <span class="msg-status read">✓✓ Odczytano</span>' : ' <span class="msg-status">✓ Wysłano</span>') : ''}</div>
      </div>
    </div>`;
  }).join('');

  wrap.scrollTop = wrap.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Send ──────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  try { await CB.sendMessage(user.id, adminId, text); renderMessages(); }
  catch (e) { showToast('Błąd: '+e.message,'error'); }
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

document.getElementById('fileInput').addEventListener('change', async function() {
  if (this.files[0]) {
    const name = this.files[0].name;
    await CB.sendMessage(user.id, adminId, `📎 Załącznik: ${name}`);
    this.value = '';
    renderMessages();
  }
});

renderMessages();
})().catch(e => { console.error(e); alert('Błąd: '+e.message); });
</script>
</body>
</html>
