<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mój Plan — Crystal Ballers</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .plan-hero {
      background: linear-gradient(135deg, var(--plan-color, var(--gold)) 0%, transparent 80%);
      background-color: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--r-2xl);
      padding: 32px 36px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s var(--ease-out) both;
    }
    .plan-hero-emoji {
      font-size: 5rem;
      position: absolute;
      right: 32px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
      filter: drop-shadow(0 0 40px rgba(0,0,0,0.5));
    }
    .plan-hero-content { position: relative; z-index: 1; max-width: 70%; }
    .plan-hero-eyebrow { font-size:0.75rem; color:var(--plan-color, var(--gold)); letter-spacing:0.12em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }
    .plan-hero-title   { font-size:1.85rem; font-weight:900; letter-spacing:-0.04em; margin-bottom:10px; }
    .plan-hero-desc    { font-size:0.9rem; color:var(--txt2); max-width:540px; line-height:1.6; }
    .plan-hero-meta    { display:flex; gap:18px; margin-top:18px; flex-wrap:wrap; }
    .plan-hero-meta-item { display:flex; flex-direction:column; }
    .plan-hero-meta-item .label { font-size:0.68rem; color:var(--txt3); text-transform:uppercase; letter-spacing:0.1em; }
    .plan-hero-meta-item .value { font-size:0.92rem; font-weight:700; margin-top:2px; }

    .phase-tabs {
      display:flex; gap:4px;
      background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg);
      padding:4px; margin-bottom:24px; overflow-x:auto;
    }
    .phase-tab {
      flex:1; min-width:140px; padding:13px 16px;
      border-radius:var(--r-md); cursor:pointer; transition:all 0.2s;
      background:none; border:none; font-family:inherit; color:var(--txt2);
      text-align:left;
    }
    .phase-tab:hover:not(.active) { color:var(--txt); background:var(--card2); }
    .phase-tab.active {
      background:var(--bg3); color:var(--txt);
      box-shadow:inset 0 0 0 1px var(--gold);
    }
    .phase-tab-num { font-size:0.7rem; color:var(--txt3); text-transform:uppercase; letter-spacing:0.1em; font-weight:600; margin-bottom:4px; }
    .phase-tab.active .phase-tab-num { color:var(--gold); }
    .phase-tab-name { font-size:0.92rem; font-weight:700; }
    .phase-tab-focus { font-size:0.74rem; color:var(--txt3); margin-top:2px; }

    .phase-overview {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-xl); padding:24px 26px; margin-bottom:24px;
      animation:fadeUp 0.4s var(--ease-out) both;
    }
    .phase-overview-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; flex-wrap:wrap; gap:12px; }
    .phase-overview h2 { font-size:1.3rem; margin-bottom:6px; }
    .phase-overview p  { color:var(--txt2); font-size:0.875rem; line-height:1.6; }
    .phase-progress-info { display:flex; align-items:center; gap:16px; }
    .phase-progress-info .num { font-size:1.6rem; font-weight:800; letter-spacing:-0.04em; color:var(--gold); }
    .phase-progress-info .lbl { font-size:0.72rem; color:var(--txt3); text-transform:uppercase; letter-spacing:0.08em; }

    .workouts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
    .workout-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-xl); padding:22px 24px;
      cursor:pointer; transition:all 0.25s var(--ease);
      text-decoration:none; color:inherit;
      animation:fadeUp 0.4s var(--ease-out) both;
      position:relative; overflow:hidden;
      display:flex; flex-direction:column;
    }
    .workout-card:hover { border-color:var(--gold); transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--gold); }
    .workout-card.completed-this-week { border-color:rgba(34,197,94,0.4); background:rgba(34,197,94,0.05); }
    .workout-card-letter {
      width:48px; height:48px;
      border-radius:var(--r-md);
      background:var(--gold);
      color:#000;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; font-weight:900;
      margin-bottom:14px;
      letter-spacing:-0.03em;
    }
    .workout-card.type-running .workout-card-letter { background:#60a5fa; }
    .workout-card.type-upper .workout-card-letter { background:#ef4444; }
    .workout-card.type-lower .workout-card-letter { background:#f59e0b; }
    .workout-card.type-fbw .workout-card-letter { background:#a855f7; }
    .workout-card.type-strength .workout-card-letter { background:#C8A45A; }
    .workout-card-title { font-size:1.05rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:4px; }
    .workout-card-subtitle { font-size:0.8rem; color:var(--txt3); margin-bottom:14px; }
    .workout-card-desc { font-size:0.82rem; color:var(--txt2); line-height:1.5; margin-bottom:18px; flex:1; }
    .workout-card-stats { display:flex; gap:14px; padding-top:14px; border-top:1px solid var(--border); margin-top:auto; font-size:0.78rem; }
    .workout-card-stats > div { flex:1; }
    .workout-card-stats .num { font-weight:700; color:var(--txt); }
    .workout-card-stats .lbl { color:var(--txt3); font-size:0.72rem; }
    .workout-card-cta {
      margin-top:14px; padding:11px 14px;
      background:var(--card2); border:1px solid var(--border2); border-radius:var(--r-md);
      font-size:0.82rem; font-weight:600;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all 0.2s;
    }
    .workout-card:hover .workout-card-cta { background:var(--gold); color:#000; border-color:var(--gold); }
    .workout-completed-tick {
      position:absolute; top:16px; right:16px;
      width:28px; height:28px; border-radius:50%;
      background:var(--green); color:#000;
      display:flex; align-items:center; justify-content:center;
    }

    .no-plan {
      text-align:center; padding:80px 20px;
      background:var(--card); border:1px solid var(--border); border-radius:var(--r-xl);
    }
    .no-plan-icon { font-size:4rem; margin-bottom:20px; opacity:0.4; }

    @media (max-width:640px) {
      .plan-hero-emoji { font-size:3rem; right:20px; opacity:0.3; }
      .plan-hero-content { max-width:100%; }
      .plan-hero { padding:24px 20px; }
    }
  </style>
</head>
<body class="app-body">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="dashboard.html">
      <div class="sidebar-logo-icon">CB</div>
      <div><div class="sidebar-logo-name">Crystal Ballers</div><div class="sidebar-logo-sub">Athletic Performance</div></div>
    </a>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link" href="dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-link" href="plan.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Mój Plan</a>
    <a class="nav-link" href="journal.html"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Dziennik</a>
    <a class="nav-link" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Wiadomości<span class="nav-badge hidden" id="msgBadge">0</span></a>
    <a class="nav-link" href="performance.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Wyniki</a>
  </div>
  <div class="sidebar-footer"><div class="sidebar-user" id="sidebarUser"></div></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main-content">
  <header class="page-header">
    <button class="hamburger" id="hamburger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1>Mój Plan</h1>
  </header>

  <div class="content" id="mainContent"></div>
</main>

<!-- PDF Viewer Modal (for individual plan only) -->
<div class="modal-overlay" id="pdfModal" style="align-items:stretch; padding:0">
  <div class="modal" style="max-width:100%; width:100%; height:100vh; border-radius:0; display:flex; flex-direction:column; padding:0; margin:0">
    <div class="pdf-toolbar">
      <div style="font-weight:600; font-size:0.9rem" id="pdfModalTitle">Plan treningowy</div>
      <div style="margin-left:auto; display:flex; gap:10px">
        <button class="btn btn-ghost btn-sm" id="pdfDownload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Pobierz
        </button>
        <button class="btn btn-ghost btn-sm" data-close-modal onclick="closeModal('pdfModal')">Zamknij</button>
      </div>
    </div>
    <div style="flex:1; overflow:hidden">
      <iframe id="pdfIframe" style="width:100%;height:100%;border:none;background:#111"></iframe>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/plans-data.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
if (!(await Auth.requirePlayer())) return;
const user = Auth.getUser();
renderSidebarUser(user);
updateMsgBadge(user.id);

const content = document.getElementById('mainContent');
let activePhase = 1;

// ─── No plan ──────────────────────────────────────────
if (!user.planId) {
  content.innerHTML = `
    <div class="no-plan">
      <div class="no-plan-icon">🔒</div>
      <h2>Brak przypisanego planu</h2>
      <p>Twój trener jeszcze nie przypisał Ci planu treningowego. Skontaktuj się przez wiadomości.</p>
      <a href="chat.html" class="btn btn-primary mt-16">Napisz do trenera</a>
    </div>`;
  throw new Error('no plan');
}

const plan = CB.getPlanById(user.planId);
if (!plan) { content.innerHTML = '<p>Nie znaleziono planu.</p>'; throw new Error(); }

// ─── INDIVIDUAL PLAN (Plan 3 — Kompletny) ─────────────
if (plan.isIndividual) {
  renderIndividualPlan();
} else if (PlanContent.hasBuiltIn(plan.id)) {
  renderBuiltInPlan();
} else {
  content.innerHTML = '<p>Plan w przygotowaniu.</p>';
}

// ═══════════════════════════════════════════════════════
// BUILT-IN PLAN (In-Season / Off-Season)
// ═══════════════════════════════════════════════════════
function renderBuiltInPlan() {
  const planContent = PlanContent.get(plan.id);
  const start = new Date(user.planStartDate);
  const elapsed = Math.max(1, Math.ceil((new Date() - start) / 86400000));
  const currentWeek = Math.min(planContent.totalWeeks, Math.ceil(elapsed / 7));
  const currentPhase = Math.min(3, Math.ceil(currentWeek / 4));
  activePhase = currentPhase;

  // Build header
  const header = `
    <div class="plan-hero" style="--plan-color:${planContent.color}">
      <div class="plan-hero-emoji">${planContent.emoji}</div>
      <div class="plan-hero-content">
        <div class="plan-hero-eyebrow">Twój aktywny plan</div>
        <div class="plan-hero-title">${planContent.name}</div>
        <div class="plan-hero-desc">${planContent.intro}</div>
        <div class="plan-hero-meta">
          <div class="plan-hero-meta-item">
            <span class="label">Status</span>
            <span class="value"><span class="badge badge-green" style="margin-top:2px"><span class="badge-dot" style="background:var(--green)"></span>Aktywny</span></span>
          </div>
          <div class="plan-hero-meta-item">
            <span class="label">Czas trwania</span>
            <span class="value">${planContent.totalWeeks} tygodni</span>
          </div>
          <div class="plan-hero-meta-item">
            <span class="label">Tydzień</span>
            <span class="value" style="color:var(--gold)">${currentWeek} / ${planContent.totalWeeks}</span>
          </div>
          <div class="plan-hero-meta-item">
            <span class="label">Aktualna faza</span>
            <span class="value" style="color:var(--gold)">Faza ${currentPhase}</span>
          </div>
        </div>
      </div>
    </div>
  `;

  // Phase tabs
  const tabs = `
    <div class="phase-tabs" id="phaseTabs">
      ${planContent.phases.map(ph => `
        <button class="phase-tab ${ph.num===activePhase?'active':''}" data-phase="${ph.num}">
          <div class="phase-tab-num">Faza ${ph.num} · ${ph.weeks} tyg.</div>
          <div class="phase-tab-name">${ph.focus}</div>
          <div class="phase-tab-focus">${getPhaseStatus(ph.num, currentPhase)}</div>
        </button>
      `).join('')}
    </div>
    <div id="phaseContent"></div>
  `;

  content.innerHTML = header + tabs;

  document.querySelectorAll('.phase-tab').forEach(t => {
    t.addEventListener('click', () => {
      activePhase = +t.dataset.phase;
      document.querySelectorAll('.phase-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      renderPhaseContent();
    });
  });

  renderPhaseContent();

  function getPhaseStatus(phaseNum, current) {
    if (phaseNum < current) return '✓ Zakończona';
    if (phaseNum === current) return '● W trakcie';
    return '○ Wkrótce';
  }

  function renderPhaseContent() {
    const phase = planContent.phases.find(p => p.num === activePhase);
    if (!phase) return;

    const totalInPhase = PlanContent.totalWorkoutsInPhase(plan.id, phase.num);
    const completedInPhase = CB.countSessionsInPhase(user.id, plan.id, phase.num);
    const pct = totalInPhase ? Math.round((completedInPhase / totalInPhase) * 100) : 0;

    // Current week for highlighting
    const phaseStartWeek = (phase.num - 1) * 4 + 1;
    const weekInPhase = Math.max(1, Math.min(4, currentWeek - phaseStartWeek + 1));

    const cards = phase.workouts.map((w, i) => {
      // check if completed this week
      const doneThisWeek = CB.hasCompletedSession(user.id, plan.id, phase.num, w.letter, currentWeek);
      const exerciseCount = w.sections.reduce((s, sec) => s + sec.exercises.length, 0);
      const typeClass = `type-${w.type}`;

      return `
        <a class="workout-card ${typeClass} ${doneThisWeek?'completed-this-week':''}"
           href="workout.html?p=${plan.id}&ph=${phase.num}&w=${w.letter}&wk=${currentWeek}"
           style="animation-delay:${i*0.06}s">
          ${doneThisWeek ? `<div class="workout-completed-tick">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>
          </div>` : ''}
          <div class="workout-card-letter">${w.letter}</div>
          <div class="workout-card-title">${w.title}</div>
          <div class="workout-card-subtitle">${w.frequency || 'Trening ' + w.letter} · ${w.duration}</div>
          <div class="workout-card-desc">${w.description}</div>
          <div class="workout-card-stats">
            <div><div class="num">${exerciseCount}</div><div class="lbl">Ćwiczeń</div></div>
            <div><div class="num">${w.sections.length}</div><div class="lbl">Sekcji</div></div>
            <div><div class="num">${typeLabel(w.type)}</div><div class="lbl">Typ</div></div>
          </div>
          <div class="workout-card-cta">
            ${doneThisWeek ? '✓ Ukończono w tym tygodniu' : 'Rozpocznij trening'}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </a>
      `;
    }).join('');

    document.getElementById('phaseContent').innerHTML = `
      <div class="phase-overview">
        <div class="phase-overview-header">
          <div>
            <h2>${phase.name} — ${phase.focus}</h2>
            <p>${phase.description}</p>
          </div>
          <div class="phase-progress-info">
            <div style="text-align:center">
              <div class="num">${pct}%</div>
              <div class="lbl">Postęp fazy</div>
            </div>
            <div style="text-align:center">
              <div class="num" style="color:var(--green)">${completedInPhase}</div>
              <div class="lbl">Treningi zrobione</div>
            </div>
            ${phase.num === currentPhase ? `<div style="text-align:center">
              <div class="num" style="color:var(--blue)">${weekInPhase}/4</div>
              <div class="lbl">Tydzień w fazie</div>
            </div>` : ''}
          </div>
        </div>
        <div class="progress-bar mt-12" style="height:8px">
          <div class="progress-bar-fill green" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="workouts-grid">${cards}</div>
    `;
  }
}

function typeLabel(type) {
  return {lower:'Dół',upper:'Góra',running:'Bieg',fbw:'FBW',strength:'Siła'}[type] || '—';
}

// ═══════════════════════════════════════════════════════
// INDIVIDUAL PLAN (Plan 3 — Piłkarz Kompletny, PDF)
// ═══════════════════════════════════════════════════════
function renderIndividualPlan() {
  const start = new Date(user.planStartDate);
  const end = new Date(user.planEndDate);
  const total = Math.ceil((end - start) / 86400000);
  const elapsed = Math.min(total, Math.ceil((new Date() - start) / 86400000));
  const pct = Math.min(100, Math.round((elapsed / total) * 100));
  const daysLeft = Math.max(0, Math.ceil((end - new Date()) / 86400000));
  const pdfSrc = user.individualPdfData;

  content.innerHTML = `
    <div class="plan-hero" style="--plan-color:${plan.color}">
      <div class="plan-hero-emoji">${plan.emoji}</div>
      <div class="plan-hero-content">
        <div class="plan-hero-eyebrow">Plan indywidualny</div>
        <div class="plan-hero-title">${plan.name}</div>
        <div class="plan-hero-desc">${plan.description}</div>
        <div class="plan-hero-meta">
          <div class="plan-hero-meta-item">
            <span class="label">Status</span>
            <span class="value"><span class="badge badge-green" style="margin-top:2px"><span class="badge-dot" style="background:var(--green)"></span>Aktywny</span></span>
          </div>
          <div class="plan-hero-meta-item">
            <span class="label">Start</span>
            <span class="value">${CB.formatDate(user.planStartDate)}</span>
          </div>
          <div class="plan-hero-meta-item">
            <span class="label">Koniec</span>
            <span class="value">${CB.formatDate(user.planEndDate)}</span>
          </div>
          <div class="plan-hero-meta-item">
            <span class="label">Pozostało</span>
            <span class="value" style="color:var(--gold)">${daysLeft} dni</span>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:22px;flex-wrap:wrap">
          ${pdfSrc ? `<button class="btn btn-primary" id="openPdfBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Otwórz plan
          </button>
          <button class="btn btn-secondary" id="downloadPdfBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Pobierz PDF
          </button>` : `<div class="badge badge-gray" style="padding:10px 16px;font-size:0.82rem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="margin-right:6px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            PDF w przygotowaniu — trener wkrótce doda plik
          </div>`}
          <a href="chat.html" class="btn btn-ghost">Napisz do trenera</a>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Postęp programu</div>
          <div class="card-subtitle">Dzień ${elapsed} z ${total}</div>
        </div>
        <span class="text-gold font-bold">${pct}%</span>
      </div>
      <div class="progress-bar" style="height:8px">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>

    ${pdfSrc ? `<div class="card mt-16">
      <div class="card-header">
        <div class="card-title">Podgląd planu</div>
      </div>
      <div style="border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-top:4px">
        <iframe src="${pdfSrc}" style="width:100%;height:600px;border:none;background:#1a1a1a"></iframe>
      </div>
    </div>` : ''}
  `;

  if (pdfSrc) {
    const pdfName = user.individualPdfName || 'plan-indywidualny.pdf';
    document.getElementById('openPdfBtn').onclick = () => {
      document.getElementById('pdfModalTitle').textContent = plan.name;
      document.getElementById('pdfIframe').src = pdfSrc;
      document.getElementById('pdfDownload').onclick = () => {
        const a = document.createElement('a'); a.href = pdfSrc; a.download = pdfName; a.click();
      };
      openModal('pdfModal');
    };
    document.getElementById('downloadPdfBtn').onclick = () => {
      const a = document.createElement('a'); a.href = pdfSrc; a.download = pdfName; a.click();
    };
  }
}
})().catch(e => { console.error(e); alert('Błąd ładowania: '+e.message); });
</script>
</body>
</html>
